[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --tb=short
    --disable-warnings
markers =
    e2e: tests end-to-end que arrancan FastAPI en proceso
    requires_tesseract: requiere binario tesseract instalado
    slow: tests que tardan > 5s
asyncio_mode = auto
